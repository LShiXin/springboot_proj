<div id="monitorManagerApp" class="page-card">
	<div class="page-title">任务列表
		<button class="logout-btn" style="float:right;margin-top:-4px;" @click="handleAddTask">添加任务</button>
	</div>
	<div v-if="isLoading" class="loading">加载中...</div>
    <table v-else class="data-table">
        <thead>
            <tr>
                <th>任务名称</th>
                <th>关键字</th>
                <th>开始时间</th>
                <th>结束时间</th>
                <th>执行间隔(分钟)</th>
                <th>状态</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody>
            <!-- 新增任务输入行 -->
            <tr v-if="addingTask" style="background:#e9f3ec;">
                <td style="min-width:120px;">
                    <input v-model="newTask.name" placeholder="任务名称" class="task-input" style="width:100%;min-width:80px;max-width:180px;" />
                </td>
                <td style="min-width:120px;">
                    <input v-model="newTask.keywords" placeholder="关键字" class="task-input" style="width:100%;min-width:80px;max-width:180px;" />
                </td>
                <td style="min-width:160px;">
                    <input v-model="newTask.startTime" type="datetime-local" class="task-input" style="width:100%;min-width:120px;max-width:200px;" />
                </td>
                <td style="min-width:160px;">
                    <input v-model="newTask.endTime" type="datetime-local" class="task-input" style="width:100%;min-width:120px;max-width:200px;" />
                </td>
                <td style="min-width:100px;">
                    <input v-model.number="newTask.intervalMinutes" type="number" min="1" placeholder="间隔(分钟)" class="task-input" style="width:100%;min-width:60px;max-width:120px;" />
                </td>
                <td style="min-width:80px;">
                    <select v-model="newTask.enabled" class="task-input" style="width:100%;min-width:60px;max-width:120px;">
                        <option :value="true">激活</option>
                        <option :value="false">关闭</option>
                    </select>
                </td>
                <td style="min-width:140px;">
                    <button class="logout-btn add-task-btn" @click="confirmAddTask" style="min-width:60px;">保存</button>
                    <button class="logout-btn cancel-task-btn" @click="cancelAddTask" style="min-width:60px;">取消</button>
                </td>
            </tr>
            <!-- 任务列表 -->
            <template v-for="task in tasks" :key="task.id">
                <tr @click="handleToggleLinks(task.id)" style="cursor:pointer;">
                    <td>
                        <template v-if="editingTaskId === task.id">
                            <input v-model="editingTask.name" class="task-input" style="width:100%;min-width:80px;max-width:180px;" />
                        </template>
                        <template v-else>{{ task.name }}</template>
                    </td>
                    <td>
                        <template v-if="editingTaskId === task.id">
                            <input v-model="editingTask.keywords" class="task-input" style="width:100%;min-width:80px;max-width:180px;" />
                        </template>
                        <template v-else>{{ task.keywords }}</template>
                    </td>
                    <td>
                        <template v-if="editingTaskId === task.id">
                            <input v-model="editingTask.startTime" type="datetime-local" class="task-input" style="width:100%;min-width:120px;max-width:200px;" />
                        </template>
                        <template v-else>{{ task.startTime }}</template>
                    </td>
                    <td>
                        <template v-if="editingTaskId === task.id">
                            <input v-model="editingTask.endTime" type="datetime-local" class="task-input" style="width:100%;min-width:120px;max-width:200px;" />
                        </template>
                        <template v-else>{{ task.endTime }}</template>
                    </td>
                    <td>
                        <template v-if="editingTaskId === task.id">
                            <input v-model.number="editingTask.intervalMinutes" type="number" min="1" class="task-input" style="width:100%;min-width:60px;max-width:120px;" />
                        </template>
                        <template v-else>{{ task.intervalMinutes }}</template>
                    </td>
                    <td>
                        <span class="status" :class="task.enabled ? 'success' : 'error'">
                            {{ task.enabled ? '激活' : '关闭' }}
                        </span>
                    </td>
                    <td>
                        <template v-if="editingTaskId === task.id">
                            <div class="edit-actions">
                                <button class="logout-btn save-btn" :disabled="!isEditingTaskModified" @click.stop="saveEditTask(task)">保存</button>
                                <button class="logout-btn cancel-btn" @click.stop="cancelEditTask">取消</button>
                            </div>
                        </template>
                        <template v-else-if="!addingTask">
                            <div class="task-actions">
                                <button class="logout-btn" :disabled="activatingTaskId === task.id" @click.stop="handleActivate(task)">{{ task.enabled ? '关闭' : '激活' }}</button>
                                <div class="more-dropdown">
                                    <button class="logout-btn more-btn">更多</button>
                                    <div class="dropdown-menu">
                                        <button class="logout-btn dropdown-item" @click.stop="handleAddLink(task)">添加扫描链接</button>
                                        <button class="logout-btn dropdown-item" @click.stop="handleEdit(task)">编辑</button>
                                        <button class="logout-btn dropdown-item" @click.stop="handleDelete(task.id)">删除</button>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </td>
                </tr>
                <!-- 链接子表 -->
                <tr v-if="showLinks[task.id]">
                    <td colspan="7" style="padding: 0; border-top: none;">
                        <div class="sub-table-container">
                            <table class="sub-table">
                                <thead>
                                    <tr>
                                        <th>监控链接</th>
                                        <th>是否启用</th>
                                        <th>备注</th>
                                        <th>
                                            操作
                                            <button class="logout-btn" @click.stop="closeSubTable(task.id)" style="float: right; min-width: 40px; padding: 4px 8px; font-size: 12px;">关闭</button>
                                        </th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr v-for="(link, idx) in task.links" :key="link.id">
                                        <td>{{ link.url }}</td>
                                        <td>
                                            <span class="status" :class="link.enabled ? 'success' : 'error'">
                                                {{ link.enabled ? '启用' : '禁用' }}
                                            </span>
                                        </td>
                                        <td>{{ link.remark }}</td>
                                        <td>
                                            <button class="logout-btn" @click.stop="toggleLinkStatus(link)">{{ link.enabled ? '关闭' : '启用' }}</button>
                                            <button class="logout-btn" @click.stop="handleEditLink(task, idx)">编辑</button>
                                            <button class="logout-btn" @click.stop="handleDeleteLink(task, idx)">删除</button>
                                        </td>
                                    </tr>
                                    <!-- 添加新链接的行 -->
                                    <tr>
                                        <td><input v-model="newLink.url" placeholder="请输入监控链接" class="task-input" /></td>
                                        <td>
                                            <select v-model="newLink.enabled" class="task-input">
                                                <option :value="true">启用</option>
                                                <option :value="false">禁用</option>
                                            </select>
                                        </td>
                                        <td><input v-model="newLink.remark" placeholder="请输入备注" class="task-input" /></td>
                                        <td>
                                            <button class="logout-btn" @click.stop="addNewLink(task)">添加</button>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </td>
                </tr>
            </template>
        </tbody>
    </table>
</div>
<link rel="stylesheet" href="/html/index_pages/monitor_manager/monitor_manager.css" />
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="/html/index_pages/monitor_manager/monitor_manager.js"></script>
