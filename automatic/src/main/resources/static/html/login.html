<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统登录</title>
    <!-- 引入CSS样式文件 -->
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>
    <div class="login-container">
        <h2 class="login-title">系统登录</h2>
        <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" class="form-input" placeholder="请输入用户名">
        </div>
        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" class="form-input" placeholder="请输入密码">
        </div>
        <div class="btn-group">
            <button id="loginBtn" class="btn primary-btn">登录</button>
            <button id="statusBtn" class="btn secondary-btn">获取服务状态</button>
        </div>
        <!-- 提示信息区域 -->
        <div id="message" class="message"></div>
        
        <!-- 注册链接 -->
        <div class="register-link">
            <p>还没有账号？ <a href="./register.html" class="register-link-text">立即注册</a></p>
        </div>
    </div>

    <!-- 欢迎弹窗 -->
    <div id="welcomeModal" class="welcome-modal" style="display: none;">
        <div class="welcome-modal-content">
            <div class="welcome-modal-header">
                <h3>🎉 欢迎使用自动化监控管理系统！</h3>
                <button id="closeModalBtn" class="close-modal-btn">&times;</button>
            </div>
            <div class="welcome-modal-body">
                <p>亲爱的用户，你好呀！👋</p>
                <p>这是我们的 <strong>v1.1 初步运行版本</strong>，就像刚学会走路的小宝宝一样，还在努力成长中~ 🚀</p>
                <p>目前我们已经实现了：</p>
                <ul>
                    <li>✅ 智能网站监控和爬虫功能</li>
                    <li>✅ 定时任务调度引擎</li>
                    <li>✅ 实时通知系统</li>
                    <li>✅ 用户友好的管理界面</li>
                </ul>
                <p>但请理解，我们还在不断优化和完善中，可能会有一些小bug或者功能不够完美的地方。</p>
                <p>如果你遇到任何问题，或者有好的建议，欢迎随时反馈！我们会像勤劳的小蜜蜂一样持续改进的~ 🐝</p>
                <p class="welcome-tip">感谢你的理解和支持，让我们一起见证这个系统的成长吧！✨</p>
            </div>
            <div class="welcome-modal-footer">
                <button id="dontShowAgainBtn" class="btn secondary-btn">不再显示</button>
                <button id="confirmModalBtn" class="btn primary-btn">我知道了，开始使用</button>
            </div>
        </div>
    </div>

    <!-- 引入JS脚本文件 -->
    <script src="../js/login.js"></script>
</body>
</html>
