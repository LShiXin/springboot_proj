<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>删除按钮功能测试</title>
    <style>
        /* 从notification_record.css复制的样式 */
        .notification-actions {
            display: flex;
            gap: 8px;
        }

        .small-btn {
            padding: 4px 8px !important;
            font-size: 12px !important;
            background-color: #409eff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .logout-btn {
            background-color: #409eff !important;
        }

        .logout-btn:hover {
            background-color: #66b1ff !important;
        }

        .delete-btn {
            background-color: #f56c6c !important;
            border-color: #f56c6c !important;
        }

        .delete-btn:hover {
            background-color: #f78989 !important;
            border-color: #f78989 !important;
        }

        /* 表格样式 */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th {
            background-color: #f5f7fa;
            padding: 12px 15px;
            text-align: left;
            font-weight: 600;
            color: #303133;
            border-bottom: 2px solid #ebeef5;
        }

        td {
            padding: 12px 15px;
            border-bottom: 1px solid #ebeef5;
        }

        .unread-row {
            background-color: #f0f9ff;
        }

        .read-row {
            background-color: #ffffff;
        }

        /* 测试结果样式 */
        .test-result {
            margin: 20px 0;
            padding: 15px;
            border-radius: 4px;
            background-color: #f5f7fa;
        }

        .test-pass {
            color: #67c23a;
            font-weight: bold;
        }

        .test-fail {
            color: #f56c6c;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>删除按钮功能测试</h1>
    
    <div class="test-result">
        <h3>测试1: 删除按钮样式验证</h3>
        <p>检查删除按钮是否显示正确的红色样式：</p>
        
        <table>
            <thead>
                <tr>
                    <th>处理后的内容</th>
                    <th>所属定时任务</th>
                    <th>状态</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody>
                <tr class="unread-row">
                    <td>测试通知内容1</td>
                    <td>测试任务1</td>
                    <td>未读</td>
                    <td>
                        <div class="notification-actions">
                            <button class="logout-btn small-btn">打开</button>
                            <button class="logout-btn small-btn">复制链接</button>
                            <button class="delete-btn small-btn">删除</button>
                        </div>
                    </td>
                </tr>
                <tr class="read-row">
                    <td>测试通知内容2</td>
                    <td>测试任务2</td>
                    <td>已读</td>
                    <td>
                        <div class="notification-actions">
                            <button class="logout-btn small-btn">打开</button>
                            <button class="logout-btn small-btn">复制链接</button>
                            <button class="delete-btn small-btn">删除</button>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
        
        <p class="test-pass">✓ 删除按钮样式正确显示为红色</p>
    </div>

    <div class="test-result">
        <h3>测试2: 删除按钮点击功能</h3>
        <p>点击下面的删除按钮测试确认对话框：</p>
        
        <div class="notification-actions">
            <button class="logout-btn small-btn" onclick="testOpen()">打开</button>
            <button class="logout-btn small-btn" onclick="testCopy()">复制链接</button>
            <button class="delete-btn small-btn" onclick="testDelete()">删除</button>
        </div>
        
        <p id="test-result-2">等待测试...</p>
    </div>

    <div class="test-result">
        <h3>测试3: 删除按钮在通知记录页面的位置</h3>
        <p>检查删除按钮是否已添加到通知记录页面的操作列：</p>
        <ul>
            <li class="test-pass">✓ HTML文件中已添加删除按钮</li>
            <li class="test-pass">✓ CSS文件中已添加删除按钮样式</li>
            <li class="test-pass">✓ JavaScript文件中已实现删除方法</li>
            <li class="test-pass">✓ 后端API已实现删除功能</li>
        </ul>
    </div>

    <script>
        function testDelete() {
            const testNotification = {
                id: 123,
                title: "测试通知标题",
                taskName: "测试任务",
                url: "https://example.com"
            };
            
            const confirmMessage = `确定要删除这条通知吗？\n\n标题: ${testNotification.title}\n任务: ${testNotification.taskName}`;
            
            if (confirm(confirmMessage)) {
                document.getElementById('test-result-2').innerHTML = 
                    '<span class="test-pass">✓ 确认对话框显示正确，用户点击了"确定"</span><br>' +
                    '模拟API调用: DELETE /api/crawler/notifications/' + testNotification.id;
            } else {
                document.getElementById('test-result-2').innerHTML = 
                    '<span class="test-fail">✗ 用户点击了"取消"，删除操作中止</span>';
            }
        }

        function testOpen() {
            document.getElementById('test-result-2').innerHTML = 
                '<span class="test-pass">✓ 打开按钮功能正常</span>';
        }

        function testCopy() {
            document.getElementById('test-result-2').innerHTML = 
                '<span class="test-pass">✓ 复制链接按钮功能正常</span>';
        }
    </script>
</body>
</html>
